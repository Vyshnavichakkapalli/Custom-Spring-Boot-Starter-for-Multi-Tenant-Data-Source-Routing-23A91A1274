server:
  port: ${SERVER_PORT:8080}

multitenancy:
  enabled: ${MULTITENANCY_ENABLED:true}
  tenants:
    - id: tenant1
      url: ${TENANT1_DB_URL:jdbc:postgresql://db:5432/tenant1_db}
      username: ${TENANT1_DB_USERNAME:user}
      password: ${TENANT1_DB_PASSWORD:password}
      driver-class-name: org.postgresql.Driver
    - id: tenant2
      url: ${TENANT2_DB_URL:jdbc:postgresql://db:5432/tenant2_db}
      username: ${TENANT2_DB_USERNAME:user}
      password: ${TENANT2_DB_PASSWORD:password}
      driver-class-name: org.postgresql.Driver
    - id: tenant3
      url: ${TENANT3_DB_URL:jdbc:postgresql://db:5432/tenant3_db}
      username: ${TENANT3_DB_USERNAME:user}
      password: ${TENANT3_DB_PASSWORD:password}
      driver-class-name: org.postgresql.Driver

spring:
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
