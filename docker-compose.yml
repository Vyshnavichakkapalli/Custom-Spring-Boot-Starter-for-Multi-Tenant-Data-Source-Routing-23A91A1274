version: '3.8'

services:
  db:
    image: postgres:14
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: demo-application/Dockerfile
    container_name: demo_app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      MULTITENANCY_ENABLED: ${MULTITENANCY_ENABLED:-true}
      TENANT1_DB_URL: ${TENANT1_DB_URL:-jdbc:postgresql://db:5432/tenant1_db}
      TENANT1_DB_USERNAME: ${TENANT1_DB_USERNAME:-user}
      TENANT1_DB_PASSWORD: ${TENANT1_DB_PASSWORD:-password}
      TENANT2_DB_URL: ${TENANT2_DB_URL:-jdbc:postgresql://db:5432/tenant2_db}
      TENANT2_DB_USERNAME: ${TENANT2_DB_USERNAME:-user}
      TENANT2_DB_PASSWORD: ${TENANT2_DB_PASSWORD:-password}
      TENANT3_DB_URL: ${TENANT3_DB_URL:-jdbc:postgresql://db:5432/tenant3_db}
      TENANT3_DB_USERNAME: ${TENANT3_DB_USERNAME:-user}
      TENANT3_DB_PASSWORD: ${TENANT3_DB_PASSWORD:-password}
      SPRING_JPA_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
